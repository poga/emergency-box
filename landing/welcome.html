<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emergency Chat</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; line-height: 1.5;
         max-width: 26rem; margin: 0 auto; padding: 1.5rem 1rem; }
  h1 { font-size: 1.6rem; margin-bottom: .25rem; }
  .tag { color: #b45309; font-weight: 600; margin-bottom: 1.25rem; }
  .card { border: 1px solid #8884; border-radius: 12px; padding: 1rem;
          margin-bottom: 1rem; }
  a.big { display: block; text-align: center; font-size: 1.1rem; font-weight: 700;
          padding: .7rem; margin-top: 1rem; border-radius: 8px;
          text-decoration: none; }
  a.primary { background: #b91c1c; color: #fff; }
  a.secondary { border: 1px solid #8886; color: inherit; }
</style>
</head>
<body>
<h1>Emergency Chat</h1>
<p class="tag">A chat room for everyone on this wifi. It keeps working even
when the internet is down.</p>

<div class="card">
  <a class="big primary" href="/join">Create account</a>
  <a class="big secondary" href="/login">Sign in</a>
</div>
</body>
</html>
